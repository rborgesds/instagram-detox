<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Detox</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="popup">
      <h1>Instagram Detox</h1>
      <p class="subtitle">Control your Instagram experience</p>
      <div class="settings">
        <label class="toggle">
          <input type="checkbox" id="hide-explore" checked />
          <span class="slider"></span>
          <span class="label">Hide Explore</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="hide-reels" checked />
          <span class="slider"></span>
          <span class="label">Hide Reels</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="filter-feed" checked />
          <span class="slider"></span>
          <span class="label">Following-Only Feed</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="video-controls" checked />
          <span class="slider"></span>
          <span class="label">Native Video Controls</span>
        </label>
      </div>
    </div>
    <script src="index.ts" type="module"></script>
  </body>
</html>
